<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Gift Reminder 🎁</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #333;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #28a745;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
    .card {
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
    .delete {
      background: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>🎁 Gift Reminder</h1>

  <input type="text" id="name" placeholder="اسم الشخص">
  <input type="date" id="date">
  <br>
  <button onclick="addReminder()">➕ إضافة</button>

  <h2>📋 التذكيرات</h2>
  <div id="list"></div>

  <script>
    let reminders = JSON.parse(localStorage.getItem("reminders")) || [];

    function saveData() {
      localStorage.setItem("reminders", JSON.stringify(reminders));
    }

    function render() {
      let list = document.getElementById("list");
      list.innerHTML = "";

      reminders.forEach((r, index) => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <strong>${r.name}</strong><br>
          📅 ${r.date}<br>
          <button class="delete" onclick="deleteReminder(${index})">❌ حذف</button>
        `;
        list.appendChild(div);
      });
    }

    function addReminder() {
      let name = document.getElementById("name").value;
      let date = document.getElementById("date").value;

      if (name === "" || date === "") {
        alert("عمر البيانات!");
        return;
      }

      reminders.push({ name, date });
      saveData();
      render();

      document.getElementById("name").value = "";
      document.getElementById("date").value = "";
    }

    function deleteReminder(index) {
      reminders.splice(index, 1);
      saveData();
      render();
    }

    render();
  </script>

</body>
</html>

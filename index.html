<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GiftMemo 🎁</title>

<style>
body {
  font-family: Arial;
  background: #F9FAFB;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #111827;
}

input, select, button {
  padding: 12px;
  margin: 6px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  background: #3B82F6;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.card {
  background: white;
  margin: 15px auto;
  padding: 20px;
  width: 320px;
  border-radius: 16px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

.gift-btn {
  background: #10B981;
  margin: 4px;
}

.delete {
  background: #EF4444;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎁 GiftMemo</h1>

<input type="text" id="name" placeholder="Name">
<input type="date" id="date">

<br>

<select id="relationship">
  <option value="">Select Relationship</option>
  <option>Wife</option>
  <option>Husband</option>
  <option>Friend</option>
  <option>Child</option>
</select>

<br>
<button onclick="addReminder()">➕ Add</button>

<h2>📋 Reminders</h2>
<div id="list"></div>

<script>

// 🧠 حساب الأيام
function daysLeft(date) {
  const today = new Date();
  const eventDate = new Date(date);
  const diffTime = eventDate - today;
  return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
}

// 💾 التخزين
let reminders = JSON.parse(localStorage.getItem("reminders")) || [];

function saveData() {
  localStorage.setItem("reminders", JSON.stringify(reminders));
}

// 🎁 AI Gifts (Random)
function getGifts(rel) {

  const allGifts = {
    Wife: ["Perfume", "Jewelry", "Handbag", "Makeup Kit", "Romantic Dinner"],
    Husband: ["Watch", "Wallet", "Perfume", "Gaming Gear", "Shoes"],
    Friend: ["Book", "T-shirt", "Headphones", "Coffee Mug", "Backpack"],
    Child: ["Toy", "Bicycle", "Video Game", "Puzzle", "Drawing Kit"]
  };

  let gifts = [...(allGifts[rel] || [])];

  // خلط حقيقي
  for (let i = gifts.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [gifts[i], gifts[j]] = [gifts[j], gifts[i]];
  }

  return gifts.slice(0, 3);
}

// 🧾 عرض البيانات
function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  if (reminders.length === 0) {
    list.innerHTML = "<p>No reminders yet 😢</p>";
    return;
  }

  reminders.forEach((r, index) => {

    let div = document.createElement("div");
    div.className = "card";

    let gifts = getGifts(r.relationship);

    div.innerHTML = `
      <strong>${r.name}</strong><br>
      📅 ${r.date}<br>
      ⏳ ${daysLeft(r.date)} days left<br>
      ❤️ ${r.relationship}<br>

      🎁 <strong style="color:#10B981;">
      ${r.gift || "Choose gift"}
      </strong>
      ${r.gift ? `<button onclick="editGift(${index})">✏️</button>` : ""}
      <br>
    `;

    // إلا ما اختارش الهدية
    if (!r.gift) {
      gifts.forEach(g => {
        let btn = document.createElement("button");
        btn.className = "gift-btn";
        btn.innerText = g;
        btn.onclick = () => selectGift(index, g);
        div.appendChild(btn);
      });
    }

    let del = document.createElement("button");
    del.className = "delete";
    del.innerText = "❌ Delete";
    del.onclick = () => deleteReminder(index);
    div.appendChild(del);

    list.appendChild(div);
  });
}

// ➕ إضافة
function addReminder() {
  let name = document.getElementById("name").value;
  let date = document.getElementById("date").value;
  let relationship = document.getElementById("relationship").value;

  if (!name || !date || !relationship) {
    alert("Fill all fields!");
    return;
  }

  reminders.push({ name, date, relationship, gift: "" });
  saveData();
  render();

  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("relationship").value = "";
}

// 🎁 اختيار هدية
function selectGift(index, gift) {
  reminders[index].gift = gift;
  saveData();
  render();
}

// ✏️ تعديل
function editGift(index) {
  reminders[index].gift = "";
  saveData();
  render();
}

// ❌ حذف
function deleteReminder(index) {
  reminders.splice(index, 1);
  saveData();
  render();
}

// 🚀 تشغيل
render();

</script>

</body>
</html>

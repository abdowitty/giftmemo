<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftMemo</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.container{
background:white;
max-width:400px;
margin:auto;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#2b7cff;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#2b7cff;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1a5edb;
}

.gift{
background:#eef3ff;
margin-top:10px;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.gift:hover{
background:#dbe6ff;
}

.selected{
background:#2b7cff;
color:white;
}

.saved{
margin-top:20px;
padding:10px;
background:#f1f1f1;
border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h2>🎁 GiftMemo</h2>

<input id="name" placeholder="Person name">
<input type="date" id="date">

<select id="relation">
<option value="">Select relationship</option>
<option value="wife">Wife</option>
<option value="husband">Husband</option>
<option value="friend">Friend</option>
<option value="child">Child</option>
</select>

<button onclick="suggest()">Suggest Gifts</button>

<div id="gifts"></div>

<button onclick="saveGift()">Save Selection</button>

<div class="saved" id="saved"></div>

</div>

<script>

let selectedGift = "";

function suggest(){
let r = document.getElementById("relation").value;
let gifts = [];

if(r=="wife"){
gifts=["Perfume","Jewelry","Romantic Dinner"];
}
if(r=="husband"){
gifts=["Watch","Wallet","Headphones"];
}
if(r=="friend"){
gifts=["Book","T-shirt","Coffee Mug"];
}
if(r=="child"){
gifts=["Toy","Bicycle","Video Game"];
}

let html = "";

gifts.forEach(g=>{
html += `<div class="gift" onclick="selectGift(this,'${g}')">${g}</div>`;
});

document.getElementById("gifts").innerHTML = html;
}

function selectGift(el, gift){
selectedGift = gift;

document.querySelectorAll(".gift").forEach(g=>{
g.classList.remove("selected");
});

el.classList.add("selected");
}

function saveGift(){

let name = document.getElementById("name").value;
let date = document.getElementById("date").value;

if(!name || !date || !selectedGift){
alert("Please fill all fields and select a gift");
return;
}

let data = {
name,
date,
gift: selectedGift
};

localStorage.setItem("giftmemo", JSON.stringify(data));

document.getElementById("saved").innerHTML =
`Saved: ${name} - ${selectedGift}`;
}

</script>

</body>
</html>

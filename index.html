<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GiftMemo 🎁</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #333;
    }
    input, select, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #3B82F6;
      color: white;
      cursor: pointer;
    }
    .card {
      background: white;
      margin: 10px auto;
      padding: 15px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .delete {
      background: red;
      margin-top: 10px;
    }
    .gift-btn {
      background: #10B981;
      margin: 3px;
    }
  </style>
</head>
<body>

  <h1>🎁 GiftMemo</h1>

  <input type="text" id="name" placeholder="Name">
  <input type="date" id="date">

  <br>

  <select id="relationship">
    <option value="">Select Relationship</option>
    <option>Wife</option>
    <option>Husband</option>
    <option>Friend</option>
    <option>Child</option>
  </select>

  <br>
  <button onclick="addReminder()">➕ Add</button>

  <h2>📋 Reminders</h2>
  <div id="list"></div>

  <script>
    let reminders = JSON.parse(localStorage.getItem("reminders")) || [];

    function saveData() {
      localStorage.setItem("reminders", JSON.stringify(reminders));
    }

    function getGifts(rel) {
      if (rel === "Wife") return ["Perfume", "Jewelry", "Romantic Dinner"];
      if (rel === "Husband") return ["Watch", "Wallet", "Dinner"];
      if (rel === "Friend") return ["Book", "T-shirt", "Watch"];
      if (rel === "Child") return ["Toy", "Bicycle", "Game"];
      return [];
    }

    function render() {
      let list = document.getElementById("list");
      list.innerHTML = "";

      reminders.forEach((r, index) => {
        let div = document.createElement("div");
        div.className = "card";

        let gifts = getGifts(r.relationship);

        div.innerHTML = `
          <strong>${r.name}</strong><br>
          📅 ${r.date}<br>
          ❤️ ${r.relationship}<br>
          🎁 ${r.gift || "Choose gift"}<br>
        `;

        gifts.forEach(g => {
          let btn = document.createElement("button");
          btn.className = "gift-btn";
          btn.innerText = g;
          btn.onclick = () => selectGift(index, g);
          div.appendChild(btn);
        });

        let del = document.createElement("button");
        del.className = "delete";
        del.innerText = "❌ Delete";
        del.onclick = () => deleteReminder(index);
        div.appendChild(del);

        list.appendChild(div);
      });
    }

    function addReminder() {
      let name = document.getElementById("name").value;
      let date = document.getElementById("date").value;
      let relationship = document.getElementById("relationship").value;

      if (!name || !date || !relationship) {
        alert("Fill all fields!");
        return;
      }

      reminders.push({ name, date, relationship, gift: "" });
      saveData();
      render();

      document.getElementById("name").value = "";
      document.getElementById("date").value = "";
      document.getElementById("relationship").value = "";
    }

    function selectGift(index, gift) {
      reminders[index].gift = gift;
      saveData();
      render();
    }

    function deleteReminder(index) {
      reminders.splice(index, 1);
      saveData();
      render();
    }

    render();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GiftMemo AI 🎁</title>

<style>
body {
  font-family: Arial;
  background: #F9FAFB;
  text-align: center;
  padding: 20px;
}
input, select, button {
  padding: 12px;
  margin: 6px;
  border-radius: 10px;
}
button {
  background: #3B82F6;
  color: white;
  border: none;
}
.card {
  background: white;
  margin: 15px auto;
  padding: 20px;
  width: 320px;
  border-radius: 16px;
}
.gift-btn {
  background: #10B981;
  margin: 4px;
}
</style>
</head>

<body>

<h1>🎁 GiftMemo AI</h1>

<input type="text" id="name" placeholder="Name">
<input type="date" id="date">

<br>

<select id="relationship">
  <option value="">Relationship</option>
  <option>Wife</option>
  <option>Husband</option>
  <option>Friend</option>
  <option>Child</option>
</select>

<br>
<button onclick="addReminder()">➕ Add</button>

<h2>📋 Reminders</h2>
<div id="list"></div>

<script>

const API_KEY = AIzaSyCoUByw-GY3Kw-sR2cmfBixeaOAP96JEgc;

let reminders = JSON.parse(localStorage.getItem("reminders")) || [];

function saveData() {
  localStorage.setItem("reminders", JSON.stringify(reminders));
}

function daysLeft(date) {
  return Math.ceil((new Date(date) - new Date()) / (1000*60*60*24));
}

// 🧠 AI FUNCTION
async function getAIGifts(rel) {
  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: `Suggest 3 gift ideas for a ${rel}. Only short answers.`
          }]
        }]
      })
    });

    const data = await response.json();

    let text = data.candidates[0].content.parts[0].text;

    // نحولو النص ل array
    return text.split("\n").filter(x => x.trim() !== "").slice(0,3);

  } catch (e) {
    return ["Gift Card", "Chocolate", "Flowers"];
  }
}

// 🧾 render
async function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  for (let i = 0; i < reminders.length; i++) {

    let r = reminders[i];
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${r.name}</strong><br>
      📅 ${r.date}<br>
      ⏳ ${daysLeft(r.date)} days left<br>
      ❤️ ${r.relationship}<br>
      🎁 ${r.gift || "Loading..."}<br>
    `;

    // إذا ما اختارش
    if (!r.gift) {
      let gifts = await getAIGifts(r.relationship);

      gifts.forEach(g => {
        let btn = document.createElement("button");
        btn.className = "gift-btn";
        btn.innerText = g;
        btn.onclick = () => selectGift(i, g);
        div.appendChild(btn);
      });
    }

    list.appendChild(div);
  }
}

function addReminder() {
  let name = nameInput.value;
  let date = dateInput.value;
  let relationship = relationshipInput.value;

  if (!name || !date || !relationship) {
    alert("Fill all fields!");
    return;
  }

  reminders.push({ name, date, relationship, gift: "" });
  saveData();
  render();
}

function selectGift(index, gift) {
  reminders[index].gift = gift;
  saveData();
  render();
}

render();

</script>

</body>
</html>
